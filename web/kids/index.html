<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="/kids/favicon.png" />
        <title>Jellybean Kids</title>
        <!-- Body + title fonts. Cause for prose, DynaPuff for the
             playful row / section / hero titles. preconnect kicks
             off the TLS handshake to Google's font CDN before the
             stylesheet request lands so the font show up on first
             paint instead of after a swap. -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Cause:wght@400;500;600;700&family=DynaPuff:wght@400;500;600;700&display=swap"
        />
        <style>
            /* Splash screen rendered before the JS bundle parses so cheap
               TVs see something animated instead of a black screen during
               the ~1-2s WebView boot + bundle parse. The kid app removes
               the .splash element after first render via React's effect
               (see main.tsx). The css here is intentionally tiny and
               self-contained - no font fetch, no external assets. */
            html, body {
                margin: 0;
                background: #faf6ee;
                color: #20162e;
                font-family: "Cause", system-ui, -apple-system, sans-serif;
            }
            .splash {
                position: fixed;
                inset: 0;
                display: grid;
                place-items: center;
                background: radial-gradient(circle at 50% 35%, #ffe7c2 0%, #faf6ee 70%);
                z-index: 9999;
                transition: opacity 400ms ease, visibility 0s 400ms;
            }
            .splash.hidden {
                opacity: 0;
                visibility: hidden;
            }
            .splash-bean {
                width: 144px;
                height: 144px;
                border-radius: 32px;
                background: #fff
                    url("/kids/jellybean-kids.png") center / cover no-repeat;
                box-shadow: 0 12px 60px rgba(124, 92, 255, 0.5);
                animation: splash-pulse 1.6s ease-in-out infinite alternate;
            }
            .splash-title {
                margin-top: 1.6rem;
                font-size: 1.8rem;
                font-weight: 700;
                letter-spacing: 0.04em;
                color: #20162e;
            }
            .splash-sub {
                margin-top: 0.5rem;
                font-size: 1rem;
                color: #6e6b7a;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }
            @keyframes splash-pulse {
                0%   { transform: scale(1);    box-shadow: 0 12px 40px rgba(124, 92, 255, 0.35); }
                100% { transform: scale(1.06); box-shadow: 0 18px 70px rgba(124, 92, 255, 0.7); }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <div class="splash" id="splash" aria-hidden>
            <div style="text-align: center">
                <div class="splash-bean"></div>
                <div class="splash-title">Jellybean Kids</div>
                <div class="splash-sub">Loading</div>
            </div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
