android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# JVM args for Gradle itself. AGP 8.x needs >= 1g comfortably.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Default kids client URL the WebView loads on launch. Override by adding
# the same key to local.properties (gitignored) so dev installs point at a
# LAN IP and production builds point at the Cloudflare hostname.
#
# 10.0.2.2 is the Android emulator's alias for the host machine's
# loopback. Real TVs need a routable LAN IP or the public hostname.
jellybean.url=http://10.0.2.2:8080/kids/
