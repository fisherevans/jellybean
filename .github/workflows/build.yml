name: build

on:
    push:
        branches: [main]
        tags: ['v*']
    pull_request:
    workflow_dispatch:

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    GO_VERSION: "1.25"
    NODE_VERSION: "20"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache: true

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            # npm workspaces: a single hoisted install at the root, then build
            # each app. web/shared (jellybean-shared) has no build script and is
            # consumed as source, so build admin/kids explicitly rather than
            # `--workspaces` (which errors on the missing script).
            - name: Install web deps
              run: npm ci --no-audit --no-fund

            - name: Build web apps
              run: npm run build:admin && npm run build:kids

            - name: Go vet
              run: GOWORK=off go vet ./...

            - name: Go test
              run: GOWORK=off go test -race ./...

            - name: Go build
              run: GOWORK=off go build ./...

    # Publishes on push to main and on vX.Y.Z tags:
    #   main  -> :latest, :sha-<short>
    #   tag   -> :vX.Y.Z, :sha-<short>
    # Deploys pin an explicit vX.Y.Z; cut a release by pushing a git tag.
    # amd64-only: every homelab consumer (arr-matey, both Proxmox nodes) is
    # x86; the TV client is a separate gradle build, not this image.
    publish:
        needs: test
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=tag
                      type=sha,format=short,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
